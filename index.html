<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кликер: Арсений</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1e2b3a 0%, #0f1722 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 16px;
    }
    .game-card {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      border-radius: 60px 60px 40px 40px;
      padding: 30px 20px 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 150, 0.15);
      text-align: center;
      transition: 0.2s;
    }
    h1 {
      margin: 0 0 8px 0;
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: 1px;
      color: #fadfbc;
      text-shadow: 0 4px 10px #a56b3b50, 0 0 0 1px #b48b5a;
      word-break: break-word;
    }
    .subhead {
      color: #b9c8d9;
      font-weight: 400;
      font-size: 1rem;
      margin-bottom: 24px;
      opacity: 0.9;
      border-bottom: 1px dashed #7f8fa3;
      padding-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .coin-display {
      background: #1f2c39;
      padding: 8px 22px;
      border-radius: 50px;
      border: 1px solid #eac394;
      box-shadow: inset 0 2px 5px #0b0f14;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1.8rem;
      color: #ffddaa;
    }
    .coin-icon {
      font-size: 2rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px #d9a343);
    }
    .avatar-wrapper {
      position: relative;
      margin: 20px auto 18px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6f8a9e, #2b3f50);
      box-shadow: 0 14px 28px #00000066, 0 0 0 4px #ddb582, 0 0 0 8px #3f2e1e;
      transition: 0.1s ease;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .avatar-wrapper:active {
      transform: scale(0.93);
      box-shadow: 0 6px 14px #000000aa, 0 0 0 4px #f5d7a8, 0 0 0 8px #4d3822;
    }
    .avatar-emoji {
      font-size: 130px;
      line-height: 1;
      filter: drop-shadow(0 8px 12px #0f1a1f);
      transform: translateY(-8px);
    }
    .click-hint {
      background: #2f4053;
      color: #e0d6c0;
      padding: 10px 16px;
      border-radius: 80px;
      font-size: 0.95rem;
      display: inline-block;
      margin: 6px 0 18px 0;
      border: 1px solid #b49b7a;
      backdrop-filter: blur(2px);
      box-shadow: inset 0 1px 4px #617183;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin: 16px 0 6px;
    }
    .stat-badge {
      background: #1e2b37;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #7c8b9b;
      color: #d8d0c0;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      backdrop-filter: blur(2px);
    }
    .reset-btn {
      background: #2e4057;
      border: none;
      border-radius: 40px;
      padding: 12px 30px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #f2e3cc;
      border: 1px solid #b29472;
      box-shadow: 0 6px 0 #0d151e, 0 4px 12px #00000055;
      transition: 0.08s linear;
      cursor: pointer;
      margin-top: 18px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
    }
    .reset-btn:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #0d151e;
    }
    .reset-btn:hover {
      background: #3f5670;
      border-color: #dbbd96;
    }
    .footer {
      margin-top: 12px;
      color: #73899b;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
    }
    /* анимация +монетка */
    .coin-fly {
      position: fixed;
      pointer-events: none;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fad87a;
      text-shadow: 0 0 20px #ffb347, 0 0 8px #ff9100;
      z-index: 999;
      animation: flyUp 0.9s ease-out forwards;
    }
    @keyframes flyUp {
      0% { opacity: 1; transform: translateY(0px) scale(0.8); }
      100% { opacity: 0; transform: translateY(-180px) scale(1.4); }
    }
    @media (max-width: 500px) {
      .game-card { padding: 20px 12px; }
      .avatar-wrapper { width: 170px; height: 170px; }
      .avatar-emoji { font-size: 100px; }
      .coin-display { font-size: 1.5rem; padding: 4px 16px; }
    }
  </style>
</head>
<body>
<div class="game-card">
  <h1>🧑‍🌾 Арсений</h1>
  <div class="subhead">
    <span>💰 кликер</span>
    <span class="coin-display">
      <span class="coin-icon">🪙</span>
      <span id="coinCounter">0</span>
    </span>
  </div>

  <!-- Персонаж -->
  <div class="avatar-wrapper" id="arseniyAvatar" role="button" aria-label="Кликни на Арсения">
    <div class="avatar-emoji">🧑‍🌾</div>
  </div>

  <div class="click-hint">
    👆 Нажми на Арсения, чтобы заработать монету!
  </div>

  <div class="stats">
    <span class="stat-badge">🎯 кликов: <span id="clickCount">0</span></span>
    <span class="stat-badge">⚡ множитель: x1</span>
  </div>

  <button class="reset-btn" id="resetButton">
    <span>⟳</span> Сбросить прогресс
  </button>
  <div class="footer">✨ каждый клик = +1 🪙</div>
</div>

<script>
  (function() {
    "use strict";

    // ----- состояние -----
    let coins = 0;
    let totalClicks = 0;

    // DOM-элементы
    const coinCounterEl = document.getElementById('coinCounter');
    const clickCountEl = document.getElementById('clickCount');
    const avatar = document.getElementById('arseniyAvatar');
    const resetBtn = document.getElementById('resetButton');

    // вспомогательная функция обновления UI
    function updateUI() {
      coinCounterEl.textContent = coins;
      clickCountEl.textContent = totalClicks;
    }

    // ----- анимация вылетающей монетки -----
    function spawnCoinAnimation(x, y) {
      const fly = document.createElement('div');
      fly.className = 'coin-fly';
      fly.textContent = '🪙 +1';
      // позиционируем около места клика (чуть выше)
      fly.style.left = (x - 30) + 'px';
      fly.style.top = (y - 30) + 'px';
      // случайный небольшой разброс
      const offsetX = (Math.random() - 0.5) * 40;
      const offsetY = (Math.random() - 0.5) * 30 - 10;
      fly.style.setProperty('--dx', offsetX + 'px');
      fly.style.setProperty('--dy', offsetY + 'px');
      document.body.appendChild(fly);

      // удаляем после анимации
      setTimeout(() => {
        if (fly.parentNode) fly.remove();
      }, 950);
    }

    // ----- обработчик клика по Арсению -----
    function handleAvatarClick(e) {
      // увеличиваем счётчики
      coins += 1;
      totalClicks += 1;
      updateUI();

      // получаем координаты для анимации (центр аватара или место клика)
      let clientX, clientY;
      if (e.clientX && e.clientY) {
        clientX = e.clientX;
        clientY = e.clientY;
      } else {
        // fallback (если вдруг)
        const rect = avatar.getBoundingClientRect();
        clientX = rect.left + rect.width / 2;
        clientY = rect.top + rect.height / 2;
      }
      spawnCoinAnimation(clientX, clientY);
    }

    // ----- сброс -----
    function resetGame() {
      if (coins === 0 && totalClicks === 0) {
        // можно и так оставить, но пусть сбрасывается
      }
      coins = 0;
      totalClicks = 0;
      updateUI();
    }

    // ----- привязываем события -----
    avatar.addEventListener('click', handleAvatarClick);
    resetBtn.addEventListener('click', resetGame);

    // дополнительно: поддержка тач-событий для мобильных (без дублирования)
    // так как click срабатывает и на тач, но чтобы избежать проблем с задержкой 300ms – ок
    // также ловим touchstart, чтобы не было задержки (но click дублирует, поэтому блокируем дубли)
    let touchFired = false;
    avatar.addEventListener('touchstart', (e) => {
      // если уже обработали touch, не даём click сработать дважды
      if (touchFired) {
        e.preventDefault();
        return;
      }
      touchFired = true;
      // эмулируем клик с координатами
      const touch = e.touches[0];
      if (touch) {
        handleAvatarClick({ clientX: touch.clientX, clientY: touch.clientY });
      } else {
        handleAvatarClick(e);
      }
      // сбрасываем флаг через короткое время
      setTimeout(() => { touchFired = false; }, 100);
      e.preventDefault();   // предотвращаем scroll/zoom
    }, { passive: false });

    // предотвращаем контекстное меню на аватаре (долгий тап)
    avatar.addEventListener('contextmenu', (e) => e.preventDefault());

    // Стартовый UI
    updateUI();

    // бонус: если кто-то кликнет на кнопку сброса – никаких лишних действий
    // дополнительно сброс по двойному клику? не надо
  })();
</script>
</body>
</html>
