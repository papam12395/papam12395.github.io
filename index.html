<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProGasi SuperMax 300CC — 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #070a14;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .info {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            background: rgba(7, 10, 20, 0.7);
            backdrop-filter: blur(16px);
            padding: 14px 36px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            width: 92%;
            max-width: 500px;
        }
        .info h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff4444, #cc2222);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .info p {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 255, 255, 0.06);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.02);
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.8;
            }
        }
        @media (max-width: 640px) {
            .info {
                padding: 10px 16px 12px;
                bottom: 16px;
            }
            .info h1 {
                font-size: 0.95rem;
            }
            .hint {
                top: 10px;
                font-size: 0.45rem;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="hint">🖱️ Тяни · 🔄 Вращай · 🔍 Скролл</div>
    <div class="info">
        <h1>🔥 ProGasi SuperMax 300CC</h1>
        <p>Enduro · 2-тактный · 2025</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x070a14);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 30);
        camera.position.set(4.5, 2.8, 6.0);
        camera.lookAt(0, 0.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.minDistance = 2.5;
        controls.maxDistance = 12;
        controls.target.set(0, 0.7, 0);
        controls.update();

        // ─── СВЕТ ──────────────────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x224466, 0.5);
        scene.add(ambient);

        const main = new THREE.DirectionalLight(0xffeedd, 3.0);
        main.position.set(5, 10, 7);
        main.castShadow = true;
        main.shadow.mapSize.width = 1024;
        main.shadow.mapSize.height = 1024;
        main.shadow.camera.near = 0.5;
        main.shadow.camera.far = 20;
        main.shadow.camera.left = -5;
        main.shadow.camera.right = 5;
        main.shadow.camera.top = 5;
        main.shadow.camera.bottom = -5;
        scene.add(main);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.4);
        fill.position.set(-4, 2, -6);
        scene.add(fill);

        const rim = new THREE.DirectionalLight(0x88ccff, 0.3);
        rim.position.set(-3, 1, 6);
        scene.add(rim);

        // ─── ПОЛ ──────────────────────────────────────────────────────────────
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(5, 32),
            new THREE.MeshStandardMaterial({ color: 0x0d1220, roughness: 0.9, metalness: 0.1, transparent: true,
                opacity: 0.4 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        scene.add(floor);

        // ─── МАТЕРИАЛЫ ────────────────────────────────────────────────────────
        const m = {
            frame: new THREE.MeshStandardMaterial({ color: 0xcc2222, metalness: 0.3, roughness: 0.5 }),
            frameDark: new THREE.MeshStandardMaterial({ color: 0x881111, metalness: 0.4, roughness: 0.5 }),
            plastic: new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.0, roughness: 0.6 }),
            plasticRed: new THREE.MeshStandardMaterial({ color: 0xdd2222, metalness: 0.1, roughness: 0.5 }),
            plasticBlue: new THREE.MeshStandardMaterial({ color: 0x1a3a7a, metalness: 0.1, roughness: 0.5 }),
            engine: new THREE.MeshStandardMaterial({ color: 0x6a7a8a, metalness: 0.9, roughness: 0.2 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xcc8833, metalness: 0.6, roughness: 0.3 }),
            tire: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95, metalness: 0.0 }),
            rim: new THREE.MeshStandardMaterial({ color: 0x4a5a6a, metalness: 0.8, roughness: 0.2 }),
            seat: new THREE.MeshStandardMaterial({ color: 0x1a0e08, roughness: 0.9, metalness: 0.0 }),
            fork: new THREE.MeshStandardMaterial({ color: 0x8a9aaa, metalness: 0.9, roughness: 0.15 }),
            handlebar: new THREE.MeshStandardMaterial({ color: 0x6a7a8a, metalness: 0.8, roughness: 0.2 }),
            exhaust: new THREE.MeshStandardMaterial({ color: 0x6a5a4a, metalness: 0.6, roughness: 0.4 }),
            light: new THREE.MeshStandardMaterial({ color: 0xffeedd, emissive: 0xffeeaa, emissiveIntensity: 0.3 }),
            grip: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 }),
            decal: new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x4488ff, emissiveIntensity: 0.02 }),
            forkTube: new THREE.MeshStandardMaterial({ color: 0xcc8833, metalness: 0.7, roughness: 0.2 }),
        };

        // ─── МОТОЦИКЛ ──────────────────────────────────────────────────────────
        const bike = new THREE.Group();
        bike.position.y = 0;

        // ===== РАМА (красная) =====
        const mainFrame = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.14, 0.2), m.frame);
        mainFrame.position.set(0, 0.75, 0);
        bike.add(mainFrame);

        // Подседельная труба
        const seatTube = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.8, 8), m.frame);
        seatTube.position.set(-0.15, 0.6, 0.5);
        seatTube.rotation.x = 0.4;
        bike.add(seatTube);

        // Верхняя труба
        const topTube = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.055, 0.65, 8), m.frame);
        topTube.position.set(0.1, 0.85, -0.3);
        topTube.rotation.x = -0.3;
        topTube.rotation.z = 0.05;
        bike.add(topTube);

        // Нижняя труба
        const downTube = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.6, 8), m.frame);
        downTube.position.set(0.05, 0.5, -0.3);
        downTube.rotation.x = -0.25;
        bike.add(downTube);

        // ===== ДВИГАТЕЛЬ =====
        const engine = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.38, 0.4), m.engine);
        engine.position.set(0.0, 0.5, 0.02);
        bike.add(engine);

        // Цилиндр
        const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.3, 12), m.engine);
        cylinder.position.set(0.0, 0.72, 0.05);
        bike.add(cylinder);

        // Головка (золотая)
        const head = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.07, 12), m.gold);
        head.position.set(0.0, 0.88, 0.05);
        bike.add(head);

        // Крышка двигателя
        const cover = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.17, 0.035, 16), m.gold);
        cover.rotation.x = Math.PI / 2;
        cover.position.set(0.28, 0.5, 0.2);
        bike.add(cover);

        // ===== ВИЛКА (золотая) =====
        const forkL = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.7, 8), m.forkTube);
        forkL.position.set(0.38, 0.55, -0.5);
        bike.add(forkL);

        const forkR = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.7, 8), m.forkTube);
        forkR.position.set(-0.38, 0.55, -0.5);
        bike.add(forkR);

        // Траверса верхняя
        const tripleTop = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.05, 0.1), m.frameDark);
        tripleTop.position.set(0, 0.85, -0.5);
        bike.add(tripleTop);

        // Траверса нижняя
        const tripleBottom = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.05, 0.1), m.frameDark);
        tripleBottom.position.set(0, 0.6, -0.5);
        bike.add(tripleBottom);

        // ===== РУЛЬ =====
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.6, 8), m.handlebar);
        bar.position.set(0, 0.92, -0.75);
        bar.rotation.x = 0.1;
        bar.rotation.z = 0.05;
        bike.add(bar);

        // Грипсы
        const gripL = new THREE.Mesh(new THREE.CylinderGeometry(0.032, 0.037, 0.06, 8), m.grip);
        gripL.position.set(0.3, 0.92, -0.77);
        gripL.rotation.x = 0.1;
        bike.add(gripL);

        const gripR = new THREE.Mesh(new THREE.CylinderGeometry(0.032, 0.037, 0.06, 8), m.grip);
        gripR.position.set(-0.3, 0.92, -0.77);
        gripR.rotation.x = 0.1;
        bike.add(gripR);

        // ===== КОЛЁСА =====
        function createWheel(x, z, scale = 1) {
            const g = new THREE.Group();

            const tire = new THREE.Mesh(
                new THREE.TorusGeometry(0.42 * scale, 0.11 * scale, 16, 24),
                m.tire
            );
            tire.rotation.y = Math.PI / 2;
            g.add(tire);

            const rim = new THREE.Mesh(
                new THREE.CylinderGeometry(0.27 * scale, 0.27 * scale, 0.05 * scale, 16),
                m.rim
            );
            rim.rotation.x = Math.PI / 2;
            g.add(rim);

            // Спицы (6)
            for (let i = 0; i < 6; i++) {
                const spoke = new THREE.Mesh(
                    new THREE.BoxGeometry(0.32 * scale, 0.01 * scale, 0.01 * scale),
                    m.rim
                );
                spoke.rotation.z = (i * Math.PI) / 6;
                g.add(spoke);
            }

            const hub = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06 * scale, 0.06 * scale, 0.06 * scale, 12),
                m.gold
            );
            hub.rotation.x = Math.PI / 2;
            g.add(hub);

            g.position.set(x, 0.12, z);
            return g;
        }

        bike.add(createWheel(0.85, 0.55, 1.0));
        bike.add(createWheel(-0.85, -0.6, 1.0));

        // ===== КРЫЛЬЯ (белые) =====
        const fenderF = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.035, 0.85), m.plastic);
        fenderF.position.set(-0.7, 0.32, -0.55);
        fenderF.rotation.x = 0.05;
        bike.add(fenderF);

        const fenderR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.035, 0.75), m.plastic);
        fenderR.position.set(0.7, 0.32, 0.55);
        fenderR.rotation.x = -0.05;
        bike.add(fenderR);

        // ===== СИДЕНЬЕ (чёрное) =====
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.09, 0.38), m.seat);
        seat.position.set(0.12, 0.82, 0.5);
        seat.rotation.x = 0.1;
        bike.add(seat);

        // ===== ТОПЛИВНЫЙ БАК (красный) =====
        const tank = new THREE.Mesh(new THREE.SphereGeometry(0.23, 12, 12), m.plasticRed);
        tank.scale.set(1.2, 0.5, 0.75);
        tank.position.set(-0.06, 0.8, -0.2);
        bike.add(tank);

        // Накладка бака (белая)
        const tankDeco = new THREE.Mesh(new THREE.SphereGeometry(0.17, 12, 12), m.plastic);
        tankDeco.scale.set(0.6, 0.25, 0.4);
        tankDeco.position.set(-0.06, 0.86, -0.2);
        bike.add(tankDeco);

        // ===== ВЫХЛОП =====
        const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.5, 8), m.exhaust);
        pipe.position.set(0.9, 0.22, 0.3);
        pipe.rotation.z = 0.1;
        bike.add(pipe);

        const silencer = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.2, 8), m.exhaust);
        silencer.position.set(1.1, 0.16, 0.34);
        silencer.rotation.z = 0.05;
        bike.add(silencer);

        // ===== ФАРА (белая) =====
        const light = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), m.light);
        light.scale.set(0.7, 0.5, 0.5);
        light.position.set(-0.85, 0.58, -0.78);
        bike.add(light);

        const bezel = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.02, 8, 12), m.frameDark);
        bezel.position.set(-0.85, 0.58, -0.81);
        bike.add(bezel);

        // ===== ЗАЩИТА РАДИАТОРА (белая) =====
        const radGuard = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.3, 0.04),
            new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.0, roughness: 0.6 })
        );
        radGuard.position.set(-0.05, 0.58, -0.45);
        bike.add(radGuard);

        // ===== НОМЕРНАЯ ПАНЕЛЬ (белая) =====
        const numberPlate = new THREE.Mesh(
            new THREE.PlaneGeometry(0.28, 0.38),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x4488ff, emissiveIntensity: 0.02 })
        );
        numberPlate.position.set(-0.5, 0.72, -0.58);
        numberPlate.rotation.y = 0.15;
        bike.add(numberPlate);

        // ===== ЗАЩИТА КАРТЕРА =====
        const skid = new THREE.Mesh(
            new THREE.BoxGeometry(0.5, 0.025, 0.3),
            new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6, roughness: 0.4 })
        );
        skid.position.set(0.0, 0.28, 0.05);
        bike.add(skid);

        scene.add(bike);

        // ─── АВТОВРАЩЕНИЕ ──────────────────────────────────────────────────────
        renderer.domElement.addEventListener('mouseenter', () => { controls.autoRotate = false; });
        renderer.domElement.addEventListener('mouseleave', () => { controls.autoRotate = true; });
        renderer.domElement.addEventListener('touchstart', () => { controls.autoRotate = false; });
        renderer.domElement.addEventListener('touchend', () => {
            setTimeout(() => { controls.autoRotate = true; }, 3000);
        });

        // ─── АНИМАЦИЯ ──────────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        setTimeout(() => { controls.autoRotate = true; }, 1500);
        console.log('🔥 ProGasi SuperMax 300CC загружен!');
    </script>
</body>
</html>
