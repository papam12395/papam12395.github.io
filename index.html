<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Арсений 🍔 толстеет</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #2b1e10 0%, #1a130a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 12px;
    }
    .game-container {
      max-width: 500px;
      width: 100%;
      background: #2f2419;
      background-image: radial-gradient(circle at 20% 30%, #4d3826, #1f160e);
      border-radius: 72px 72px 48px 48px;
      padding: 28px 18px 30px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.8), 0 0 0 1px #b48b5a55;
      text-align: center;
      transition: 0.2s;
      border: 1px solid #7a5d3e;
    }
    h1 {
      margin: 0 0 4px;
      font-weight: 700;
      font-size: 2.3rem;
      letter-spacing: 1px;
      color: #fbdeb4;
      text-shadow: 0 4px 0 #6b4c2c, 0 8px 16px #00000077;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sub-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c150ecc;
      backdrop-filter: blur(4px);
      padding: 10px 18px;
      border-radius: 60px;
      margin: 10px 0 16px;
      border: 1px solid #bd9a70;
      box-shadow: inset 0 2px 6px #0a0704;
      color: #f7e3c6;
      font-weight: 500;
      flex-wrap: wrap;
      gap: 6px;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.3rem;
      background: #2e1f13;
      padding: 4px 16px 4px 12px;
      border-radius: 40px;
      border: 1px solid #a8835a;
    }
    .stat span:last-child {
      min-width: 2.4rem;
      text-align: center;
      color: #ffdba5;
    }
    .burger-counter {
      background: #412f1d;
      padding: 4px 18px 4px 14px;
      border-radius: 60px;
      border: 1px solid #dbb07c;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.4rem;
    }

    /* Аватар с динамическим размером */
    .avatar-wrap {
      position: relative;
      margin: 6px auto 8px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 25%, #d6b18a, #7a5a3a);
      box-shadow: 0 18px 30px #000000aa, 0 0 0 5px #e1b888, 0 0 0 10px #4d3421;
      transition: all 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      will-change: transform, width, height;
    }
    .avatar-wrap:active {
      transform: scale(0.92);
      box-shadow: 0 8px 16px #000000dd, 0 0 0 5px #fad7a0, 0 0 0 10px #5a3d26;
    }
    .avatar-emoji {
      font-size: 110px;
      line-height: 1;
      filter: drop-shadow(0 8px 12px #281e13);
      transition: font-size 0.2s ease;
      transform: translateY(-4px);
    }
    /* шкала веса / толщины */
    .weight-bar {
      background: #2b1d13;
      height: 14px;
      border-radius: 40px;
      margin: 12px 8px 8px;
      border: 1px solid #b18a61;
      overflow: hidden;
      box-shadow: inset 0 3px 6px #0b0805;
    }
    .weight-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f5b56b, #e0843a, #c95f1e);
      border-radius: 40px;
      transition: width 0.25s ease-out;
      box-shadow: 0 0 14px #f59f4a;
    }
    .burger-btn {
      background: #d9a066;
      border: none;
      border-radius: 120px;
      padding: 16px 18px;
      font-weight: 700;
      font-size: 1.7rem;
      color: #2f1c0a;
      background: linear-gradient(145deg, #f5c894, #d49a5a);
      box-shadow: 0 8px 0 #7a521f, 0 10px 24px #00000066;
      transition: 0.06s linear;
      cursor: pointer;
      margin: 14px auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: fit-content;
      padding: 14px 36px;
      border: 1px solid #ffdbb0;
    }
    .burger-btn:active {
      transform: translateY(8px);
      box-shadow: 0 1px 0 #7a521f;
    }
    .reset-btn {
      background: #3d2e1d;
      border: 1px solid #b18455;
      border-radius: 60px;
      padding: 10px 28px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #f2debc;
      box-shadow: 0 5px 0 #1a1109;
      transition: 0.06s linear;
      cursor: pointer;
      margin: 10px auto 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .reset-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #1a1109;
    }
    .footer {
      margin-top: 16px;
      color: #b4956c;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      border-top: 1px dashed #785d3d;
      padding-top: 12px;
    }
    /* Летающие бургеры */
    .burger-fly {
      position: fixed;
      pointer-events: none;
      font-size: 2.6rem;
      font-weight: 700;
      color: #f5c542;
      text-shadow: 0 0 24px #ff8c00, 0 0 8px #c96800;
      z-index: 999;
      animation: flyBurger 1s ease-out forwards;
    }
    @keyframes flyBurger {
      0% { opacity: 1; transform: translateY(0px) scale(0.7) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-200px) scale(1.3) rotate(15deg); }
    }
    /* стадии толщины (доп. визуал) */
    .fat-level {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 2px 0 6px;
      font-size: 0.9rem;
      color: #dbbd99;
    }
    @media (max-width: 480px) {
      .avatar-wrap { width: 160px; height: 160px; }
      .avatar-emoji { font-size: 85px; }
      h1 { font-size: 1.8rem; }
      .burger-btn { font-size: 1.4rem; padding: 12px 24px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>
    <span>🍔</span> Арсений <span>🐷</span>
  </h1>

  <div class="sub-header">
    <div class="stat">
      <span>🍟</span> <span id="burgerCount">0</span>
    </div>
    <div class="burger-counter">
      <span>🍔</span> <span id="burgerEaten">0</span>
    </div>
  </div>

  <!-- Персонаж (кликабельный) -->
  <div class="avatar-wrap" id="avatarWrap" role="button" aria-label="Покорми Арсения бургером">
    <div class="avatar-emoji" id="avatarEmoji">🧑‍🍳</div>
  </div>

  <!-- Шкала толщины (вес) -->
  <div class="weight-bar">
    <div class="weight-fill" id="weightFill" style="width: 0%;"></div>
  </div>
  <div class="fat-level" id="fatLevelLabel">🥩 норма</div>

  <!-- Кнопка "Съесть бургер" (дублирует клик) -->
  <button class="burger-btn" id="burgerButton">
    <span>🍔</span> Съесть бургер <span>🍔</span>
  </button>

  <button class="reset-btn" id="resetButton">
    <span>🔄</span> Сбросить диету
  </button>
  <div class="footer">Кликай на Арсения или на кнопку — он толстеет!</div>
</div>

<script>
  (function() {
    "use strict";

    // --- состояние ---
    let burgers = 0;          // съедено бургеров
    let weightPercent = 0;    // 0..100

    // максимальный "вес" для 100% (сколько бургеров до максимума)
    const MAX_BURGERS = 25;

    // DOM
    const avatarWrap = document.getElementById('avatarWrap');
    const avatarEmoji = document.getElementById('avatarEmoji');
    const burgerCountEl = document.getElementById('burgerCount');
    const burgerEatenEl = document.getElementById('burgerEaten');
    const weightFill = document.getElementById('weightFill');
    const fatLevelLabel = document.getElementById('fatLevelLabel');
    const burgerButton = document.getElementById('burgerButton');
    const resetBtn = document.getElementById('resetButton');

    // --- обновление UI ---
    function updateUI() {
      // счётчики
      burgerEatenEl.textContent = burgers;
      // процент веса (кап)
      let percent = Math.min(100, (burgers / MAX_BURGERS) * 100);
      weightPercent = Math.min(100, percent);
      weightFill.style.width = weightPercent + '%';

      // динамический размер аватара (от 160px до 260px)
      const baseSize = 160;
      const maxSize = 270;
      const size = baseSize + (weightPercent / 100) * (maxSize - baseSize);
      avatarWrap.style.width = size + 'px';
      avatarWrap.style.height = size + 'px';

      // меняем эмодзи и подпись стадии
      let emoji = '🧑‍🍳';
      let label = '🥩 стройный';
      if (weightPercent < 15) {
        emoji = '🧑‍🍳';
        label = '🥩 поджарый';
      } else if (weightPercent < 35) {
        emoji = '👨‍🍳';
        label = '🍔 в форме';
      } else if (weightPercent < 55) {
        emoji = '🧑‍🦰';
        label = '🍟 аппетитный';
      } else if (weightPercent < 75) {
        emoji = '🧔‍♂️';
        label = '🍔🍔 плотный';
      } else if (weightPercent < 90) {
        emoji = '👨‍🦱';
        label = '🐷 солидный';
      } else {
        emoji = '🐷';
        label = '🐷 АРСЕНИЙ ТОЛСТЯК!';
      }
      avatarEmoji.textContent = emoji;
      fatLevelLabel.textContent = label;

      // если дошли до 100% — особый статус
      if (weightPercent >= 99.9) {
        fatLevelLabel.textContent = '🐷💥 АРСЕНИЙ — БУРГЕР-МОНСТР!';
        avatarEmoji.textContent = '🐷👑';
      }
    }

    // --- анимация летящего бургера ---
    function spawnBurgerAnimation(x, y) {
      const fly = document.createElement('div');
      fly.className = 'burger-fly';
      fly.textContent = '🍔';
      fly.style.left = (x - 30) + 'px';
      fly.style.top = (y - 30) + 'px';
      document.body.appendChild(fly);
      setTimeout(() => {
        if (fly.parentNode) fly.remove();
      }, 1050);
    }

    // --- покормить Арсения ---
    function feedBurger(e) {
      // увеличиваем счётчик
      burgers = Math.min(burgers + 1, MAX_BURGERS + 5); // можно перекормить, но шкала 100%
      updateUI();

      // спавн анимации
      let clientX, clientY;
      if (e && e.clientX !== undefined) {
        clientX = e.clientX;
        clientY = e.clientY;
      } else {
        // если вызов без события (кнопка) — по центру аватара
        const rect = avatarWrap.getBoundingClientRect();
        clientX = rect.left + rect.width / 2;
        clientY = rect.top + rect.height / 2;
      }
      spawnBurgerAnimation(clientX, clientY);
    }

    // --- сброс (диета) ---
    function resetGame() {
      burgers = 0;
      updateUI();
      // дополнительно: анимация сброса (мигание)
      avatarWrap.style.transition = '0.15s';
      avatarWrap.style.transform = 'scale(0.8)';
      setTimeout(() => {
        avatarWrap.style.transform = 'scale(1)';
      }, 150);
    }

    // --- обработчики ---

    // 1. клик по аватару
    avatarWrap.addEventListener('click', (e) => {
      feedBurger(e);
    });

    // 2. клик по кнопке "Съесть бургер"
    burgerButton.addEventListener('click', (e) => {
      // передаём координаты кнопки для анимации
      const rect = burgerButton.getBoundingClientRect();
      feedBurger({
        clientX: rect.left + rect.width / 2,
        clientY: rect.top - 10
      });
    });

    // 3. сброс
    resetBtn.addEventListener('click', resetGame);

    // --- поддержка тач (мобилы) без дублирования ---
    let touchLock = false;
    avatarWrap.addEventListener('touchstart', (e) => {
      if (touchLock) {
        e.preventDefault();
        return;
      }
      touchLock = true;
      const touch = e.touches[0];
      if (touch) {
        feedBurger({ clientX: touch.clientX, clientY: touch.clientY });
      } else {
        feedBurger(e);
      }
      setTimeout(() => { touchLock = false; }, 120);
      e.preventDefault();
    }, { passive: false });

    // отключаем контекстное меню на аватаре
    avatarWrap.addEventListener('contextmenu', (e) => e.preventDefault());

    // инициализация
    updateUI();

    // дополнительный фикс: если кликнуть по кнопке сброса — не дублировать
    // всё ок
  })();
</script>
</body>
</html>
