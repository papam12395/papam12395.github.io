<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Геометри Дэш — Арсений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
        }
        .game-wrapper {
            background: #141a24;
            border-radius: 40px;
            padding: 20px 20px 24px;
            box-shadow: 0 20px 40px #00000099, 0 0 0 1px #3f4b5e;
            max-width: 780px;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #1a2330;
            border-radius: 24px;
            box-shadow: inset 0 0 30px #0b0f16, 0 8px 18px #00000077;
            cursor: pointer;
            touch-action: none;
        }
        .ui-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 8px 6px;
            color: #d4e0f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .level-indicator {
            background: #1f2a39;
            padding: 8px 22px;
            border-radius: 40px;
            border: 1px solid #6c7f94;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .level-indicator span {
            background: #2d3d50;
            padding: 2px 16px;
            border-radius: 30px;
            color: #f5dba8;
        }
        .score-box {
            background: #1b2533;
            padding: 6px 22px 6px 18px;
            border-radius: 60px;
            border: 1px solid #6d8199;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            background: #314257;
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 1rem;
            color: #edf2fa;
            border: 1px solid #7f93ad;
            box-shadow: 0 4px 0 #141d29;
            transition: 0.06s linear;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #141d29;
        }
        .btn-primary {
            background: #4b6a8a;
            border-color: #b0c9e5;
            color: white;
        }
        .controls-hint {
            color: #8a9bb0;
            font-size: 0.9rem;
            padding: 6px 12px;
            background: #1d2633;
            border-radius: 30px;
            border: 1px solid #3f5167;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 12px; }
            .ui-bar { flex-direction: column; align-items: stretch; }
            .level-indicator { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="720" height="400"></canvas>

    <div class="ui-bar">
        <div class="level-indicator">
            🏁 Уровень <span id="levelDisplay">1</span>
        </div>
        <div class="score-box">
            🏆 <span id="scoreDisplay">0</span>
        </div>
        <button class="btn btn-primary" id="restartBtn">⟳ Рестарт</button>
        <button class="btn" id="nextLevelBtn">➡ Уровень +</button>
    </div>
    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; margin: 6px 8px 0;">
        <span class="controls-hint">␣ Пробел / Клик — прыжок</span>
        <span class="controls-hint" id="statusMessage">▶ Нажми, чтобы начать</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // --- CANVAS ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- UI элементы ---
        const levelDisplay = document.getElementById('levelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const statusMsg = document.getElementById('statusMessage');
        const restartBtn = document.getElementById('restartBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');

        // --- размеры ---
        const W = 720, H = 400;
        canvas.width = W; canvas.height = H;

        // --- Игровые константы ---
        const GRAVITY = 0.55;
        const JUMP_FORCE = -9.2;
        const GROUND_Y = 340;        // линия пола (y координата)
        const PLAYER_SIZE = 28;
        const PLAYER_X = 100;

        // --- состояния ---
        let gameState = 'idle';       // idle, playing, dead, win
        let currentLevel = 1;
        let score = 0;               // количество пройденных препятствий

        // --- игрок ---
        const player = {
            x: PLAYER_X,
            y: GROUND_Y - PLAYER_SIZE,
            w: PLAYER_SIZE,
            h: PLAYER_SIZE,
            vy: 0,
            onGround: true
        };

        // --- препятствия / платформы ---
        let obstacles = [];
        let levelLength = 0;          // для генерации

        // --- флаги ---
        let gameOver = false;
        let winFlag = false;

        // --- таймер анимации ---
        let animId = null;

        // ---- ГЕНЕРАЦИЯ УРОВНЯ ----
        function generateLevel(level) {
            obstacles = [];
            const baseCount = 8 + level * 2;   // сложность растёт
            const maxCount = Math.min(22, baseCount);
            const spacing = 60 + Math.max(0, 10 - level * 0.8); // дистанция между препятствиями

            let x = 200;
            for (let i = 0; i < maxCount; i++) {
                // тип: 0 - обычный куб (наземный), 1 - летающий куб (средний), 2 - платформа (снизу)
                let type = 0;
                let yOffset = 0;
                let w = 20, h = 20;
                const r = Math.random();

                if (level > 1 && r < 0.25) {
                    type = 1; // летающий
                    yOffset = -50 - Math.random() * 40;
                    w = 18; h = 18;
                } else if (level > 2 && r < 0.15) {
                    type = 2; // платформа (низкая, надо перепрыгнуть)
                    yOffset = 0;
                    w = 35; h = 14;
                } else {
                    type = 0;
                    w = 20 + (level > 2 ? 6 : 0);
                    h = 20 + (level > 2 ? 6 : 0);
                }

                // случайный сдвиг по Y для разнообразия
                if (type === 0) {
                    // наземный, иногда чуть выше
                    yOffset = -Math.random() * 8;
                }

                const baseY = GROUND_Y - h + yOffset;
                obstacles.push({
                    x: x,
                    y: baseY,
                    w: w,
                    h: h,
                    type: type,
                    passed: false,    // для подсчёта очков
                    originalY: baseY
                });
                x += spacing + 30 + Math.random() * 35;
            }

            // финишная линия (последний объект - флажок)
            obstacles.push({
                x: x + 60,
                y: GROUND_Y - 50,
                w: 10,
                h: 50,
                type: 'finish',
                passed: false
            });

            levelLength = x + 120;
            // сброс счётчика прохождения
            score = 0;
            updateScoreUI();
        }

        // --- сброс игрока ---
        function resetPlayer() {
            player.x = PLAYER_X;
            player.y = GROUND_Y - PLAYER_SIZE;
            player.vy = 0;
            player.onGround = true;
        }

        // --- инициализация уровня ---
        function initLevel(level) {
            currentLevel = Math.min(10, Math.max(1, level));
            levelDisplay.textContent = currentLevel;
            generateLevel(currentLevel);
            resetPlayer();
            gameOver = false;
            winFlag = false;
            gameState = 'idle';
            statusMsg.textContent = '▶ Нажми пробел / клик, чтобы стартовать';
            updateScoreUI();
        }

        // --- UI счёт ---
        function updateScoreUI() {
            scoreDisplay.textContent = score;
        }

        // --- физика и логика ---
        function updateGame() {
            if (gameState !== 'playing') return;

            // гравитация
            player.vy += GRAVITY;
            player.y += player.vy;

            // пол
            if (player.y + player.h >= GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }

            // проверка столкновений с препятствиями
            for (let obs of obstacles) {
                if (obs.type === 'finish') {
                    // финиш: проверяем пересечение
                    if (rectCollide(player, obs)) {
                        // победа!
                        if (!winFlag) {
                            winFlag = true;
                            gameState = 'win';
                            statusMsg.textContent = '🎉 УРОВЕНЬ ПРОЙДЕН! Нажми "Уровень +"';
                        }
                        continue;
                    }
                    // если игрок прошёл финиш (по x) и не было победы — засчитываем
                    if (player.x + player.w > obs.x && !winFlag && !obs.passed) {
                        obs.passed = true;
                        score += 1;
                        updateScoreUI();
                    }
                    continue;
                }

                // обычные препятствия
                if (rectCollide(player, obs)) {
                    gameOver = true;
                    gameState = 'dead';
                    statusMsg.textContent = '💀 Ты врезался! Нажми Рестарт';
                    return;
                }

                // подсчёт очков за прохождение препятствия (если не финиш)
                if (!obs.passed && player.x > obs.x + obs.w + 10) {
                    obs.passed = true;
                    score += 1;
                    updateScoreUI();
                }
            }

            // вылет за левую/правую границу (смерть)
            if (player.x + player.w < 0 || player.x > 780) {
                gameOver = true;
                gameState = 'dead';
                statusMsg.textContent = '💀 Вышел за край! Рестарт';
            }
        }

        // --- столкновение прямоугольников ---
        function rectCollide(a, b) {
            return a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y;
        }

        // --- прыжок ---
        function jump() {
            if (gameState === 'idle') {
                // старт игры
                gameState = 'playing';
                statusMsg.textContent = '🎮 Играем!';
                // разрешаем прыжок
                if (player.onGround) {
                    player.vy = JUMP_FORCE;
                    player.onGround = false;
                }
                return;
            }
            if (gameState === 'playing' && player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
            }
            // если dead или win — игнорируем прыжок
        }

        // --- ОТРИСОВКА ---
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // фон
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#141e2b');
            grad.addColorStop(0.7, '#1d2b3c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // пол
            ctx.fillStyle = '#2d4055';
            ctx.fillRect(0, GROUND_Y, W, 6);
            ctx.fillStyle = '#3c5a74';
            ctx.fillRect(0, GROUND_Y + 6, W, 12);
            // декоративные линии
            ctx.strokeStyle = '#5a7a94';
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 45) {
                ctx.beginPath();
                ctx.moveTo(i, GROUND_Y);
                ctx.lineTo(i + 20, GROUND_Y - 8);
                ctx.stroke();
            }

            // препятствия
            for (let obs of obstacles) {
                if (obs.type === 'finish') {
                    // флажок
                    ctx.fillStyle = '#f5c542';
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = '#f0e68c';
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.w, obs.y + 4);
                    ctx.lineTo(obs.x + obs.w + 18, obs.y + 12);
                    ctx.lineTo(obs.x + obs.w, obs.y + 22);
                    ctx.fill();
                    ctx.fillStyle = '#ffdd99';
                    ctx.font = 'bold 14px sans-serif';
                    ctx.fillText('🏁', obs.x - 8, obs.y - 6);
                    continue;
                }

                // цвет в зависимости от типа
                if (obs.type === 1) {
                    ctx.fillStyle = '#d48f5b'; // летающий
                } else if (obs.type === 2) {
                    ctx.fillStyle = '#6a9ec7'; // платформа
                } else {
                    ctx.fillStyle = '#b0b8c0';
                }
                ctx.shadowColor = '#00000066';
                ctx.shadowBlur = 12;
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.shadowBlur = 0;
                // обводка
                ctx.strokeStyle = '#e0eaf5';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
            }

            // игрок
            ctx.shadowColor = '#8ab3d0';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#7fc1f0';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#cce5ff';
            ctx.lineWidth = 2.5;
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            // глаза
            ctx.fillStyle = '#f5f9ff';
            ctx.beginPath();
            ctx.arc(player.x + 8, player.y + 8, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 8, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(player.x + 8, player.y + 8, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 8, 2, 0, Math.PI * 2);
            ctx.fill();

            // текущий уровень / счёт на канвасе
            ctx.fillStyle = '#d0dcee';
            ctx.font = 'bold 16px monospace';
            ctx.fillText(`УРОВЕНЬ ${currentLevel}`, 20, 40);
            if (gameState === 'dead') {
                ctx.fillStyle = '#ff7a7a';
                ctx.font = 'bold 32px sans-serif';
                ctx.fillText('💀 ПРОВАЛ', 250, 160);
            } else if (gameState === 'win') {
                ctx.fillStyle = '#f5e56b';
                ctx.font = 'bold 34px sans-serif';
                ctx.fillText('🌟 ПОБЕДА!', 240, 150);
            }
        }

        // --- цикл ---
        function gameLoop() {
            updateGame();
            draw();
            animId = requestAnimationFrame(gameLoop);
        }

        // --- ЗАПУСК / перезапуск ---
        function restartLevel() {
            initLevel(currentLevel);
            // принудительно ставим playing, если был dead/win
            if (gameState === 'dead' || gameState === 'win' || gameState === 'idle') {
                gameState = 'playing';
                statusMsg.textContent = '🎮 Играем!';
            }
        }

        // --- ОБРАБОТЧИКИ ---
        function handleJump(e) {
            if (e) e.preventDefault();
            jump();
        }

        // --- события ---
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (gameState === 'dead' || gameState === 'win') {
                    // можно рестартнуть по пробелу
                    restartLevel();
                } else {
                    handleJump(e);
                }
            }
        });

        canvas.addEventListener('click', (e) => {
            if (gameState === 'dead' || gameState === 'win') {
                restartLevel();
            } else {
                handleJump(e);
            }
        });

        // тач
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'dead' || gameState === 'win') {
                restartLevel();
            } else {
                handleJump(e);
            }
        }, { passive: false });

        // кнопки
        restartBtn.addEventListener('click', () => {
            restartLevel();
        });

        nextLevelBtn.addEventListener('click', () => {
            let next = currentLevel + 1;
            if (next > 10) next = 1;
            initLevel(next);
            // автозапуск
            gameState = 'playing';
            statusMsg.textContent = '🎮 Новый уровень!';
        });

        // --- инициализация ---
        initLevel(1);
        gameState = 'idle';
        statusMsg.textContent = '▶ Нажми пробел / клик, чтобы стартовать';
        // запуск цикла
        if (animId) cancelAnimationFrame(animId);
        gameLoop();

        // дополнительно: ресайз канваса не меняем
    })();
</script>
</body>
</html>
